<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Milka's Blog :3</title>
        <link rel="icon" type="image/x-icon" href="icon.ico">
        <style>
            @font-face {
                font-family: 'Ithaca';
                src: url('ithaca.ttf') format('truetype');
            }

            body {
                background: url("bg.gif") center/cover no-repeat;
                height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: 'Ithaca', sans-serif;
            }

            .main {
                background: rgb(240, 227, 193);
                width: 1000px;
                height: 600px;
                border-radius: 30px;
                padding: 20px;
                text-align: center;
                overflow-y: auto;
            }

            .blog-post {
                margin: 20px auto;
                max-width: 800px;
                text-align: left;
                padding: 20px;
                background: rgba(255, 255, 255, 0.5);
                border-radius: 10px;
            }

            .blog-post h2 {
                color: #333;
                margin-bottom: 10px;
            }

            .blog-post .date {
                color: #666;
                font-size: 0.9em;
                margin-bottom: 15px;
            }

            .back-button {
                display: inline-block;
                margin: 10px;
                padding: 8px 15px;
                background: transparent;
                border: 1px dashed #999;
                color: #666;
                text-decoration: none;
                font-family: 'Ithaca';
                border-radius: 5px;
            }

            .back-button:hover {
                background: #0a0b49;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="main">
            <a href="index.html" class="back-button">← Back to main page</a>
            <h1>Blog Posts</h1>
            
            <div class="blog-post">
                <h2>Its never too late to get back on your feet</h2>
                <div class="date">September 2023</div>
                <p>Content coming soon! ^w^</p>
            </div>
        </div>
    </body>
</html>
