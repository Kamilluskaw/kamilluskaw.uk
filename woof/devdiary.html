<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Milka's Blog :3</title>
        <link rel="icon" type="image/x-icon" href="icon.ico">
        <style>
            @font-face {
                font-family: 'Ithaca';
                src: url('ithaca.ttf') format('truetype');
            }

            body {
                background: url("glitch.gif") center/cover no-repeat;
                height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: 'Ithaca', sans-serif;
            }

            .main {
                background: rgba(203, 147, 214, 0.418);
                width: 1200px;
                height: 2000px;
                border-radius: 30px;
                padding: 20px;
                text-align: center;
                overflow-y: auto;
            }

            .blog-post {
                margin: 20px auto;
                max-width: 800px;
                text-align: left;
                padding: 20px;
                background: rgba(196, 191, 191, 0.5);
                border-radius: 10px;
            }

            .blog-post h2 {
                color: #ffffff;
                margin-bottom: 10px;
            }

            .blog-post .date {
                color: #e4d5d5;
                font-size: 0.9em;
                margin-bottom: 15px;
            }

            .back-button {
                display: inline-block;
                margin: 10px;
                padding: 8px 15px;
                background: transparent;
                border: 1px dashed #999;
                color: #dbd3d3;
                text-decoration: none;
                font-family: 'Ithaca';
                border-radius: 5px;
            }

            .back-button:hover {
                background: #b0b0bb;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="main">
            <a href="index.html" class="back-button">← Back to main page</a>
            <img src="disgracedarchangels.png" alt="Me!">
            <div class="blog-post">
                <h2>Dev Diary I.</h2>
                <div class="date">September 2025</div>
                <p>Content coming soon! ^w^</p>
            </div>
        </div>
    </body>
</html>
