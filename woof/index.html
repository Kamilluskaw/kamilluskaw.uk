<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Milka's Website :3</title>
        <link rel="icon" type="image/x-icon" href="icon.ico">
        <style>
        @font-face {
            font-family: 'Ithaca';
            src: url('ithaca.ttf') format('truetype');
        }

           body {
            background-image: url("bg.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slowdown 20s steps(1) infinite;
            font-family: 'Ithaca', sans-serif;
            }

            @keyframes slowdown {
                100% {
                    background-position: center center;
                }
            }

            .rectangle {
                background-color: rgb(235, 221, 183);
                width: 800px;
                height: 600px;
                border-radius: 30px;
                padding: 20px;
                position: relative;
                text-align: center;
            }

            h1 {
                margin-top: 20px;
                margin-bottom: 20px;
            }

.dropbtn {
  background-color: transparent;
  color: #666;
  padding: 8px;
  font-size: 14px;
  border: 1px dashed #999;
  font-family: 'Ithaca', monospace;
  cursor: pointer;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  font-family: 'Ithaca', sans-serif;
}

.dropdown-content a:hover {background-color: #fcfcfc;}

.dropdown:hover .dropdown-content {display: block;}

.dropdown:hover .dropbtn {
  background-color: #f0f0f0;
  color: #333;
}

.preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px auto;
            max-width: 700px;
        }

        .preview-item {
            cursor: pointer;
            text-decoration: none;
            color: #666;
        }

        .preview-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #666;
        }

        .preview-item p {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
    </head>    
    <body>
        <div class="rectangle">
            <h1>hiiiiiii!!!!💕 </h1>
            
            <div class="preview-grid">
                <a href="https://www.wattpad.com/1531691152-panel-a-semmiben" class="preview-item">
                    <img src="panelasemmiben.png" alt="Preview 1">
                    <p>🇭🇺 Panel a semmiben</p>
                </a>
                <a href="#link2" class="preview-item">
                    <img src="preview2.jpg" alt="Preview 2">
                    <p>Description 2</p>
                </a>
                <a href="#link3" class="preview-item">
                    <img src="preview3.jpg" alt="Preview 3">
                    <p>Description 3</p>
                </a>
                <a href="#link4" class="preview-item">
                    <img src="preview4.jpg" alt="Preview 4">
                    <p>Description 4</p>
                </a>
                <a href="#link5" class="preview-item">
                    <img src="preview5.jpg" alt="Preview 5">
                    <p>Description 5</p>
                </a>
            </div>

            <div class="dropdown">
                <button class="dropbtn">You can also find me on these platforms c: </button>
                <div class="dropdown-content">
                    <a href="https://x.com/kamilluskaw">Twitter</a>
                    <a href="https://www.twitch.tv/kamilluskaw">Twitch</a>
                    <a href="https://www.youtube.com/@kamilluskaw">Youtube</a>
                </div>
            </div>
        </div>
    </body>
</html>
