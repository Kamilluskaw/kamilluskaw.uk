<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Milka's Website :3</title>
        <link rel="icon" type="image/x-icon" href="icon.ico">
        <style>
           body {
            background-image: url("bg.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slowdown 20s steps(1) infinite;
            }

            @keyframes slowdown {
                100% {
                    background-position: center center;
                }
            }

            .rectangle {
                background-color: rgb(235, 221, 183);
                width: 800px;
                height: 600px;
                border-radius: 30px;
                padding: 20px;
                position: relative;
                text-align: center;
            }

            h1 {
                margin-top: 20px;
                margin-bottom: 20px;
            }

.dropbtn {
  background-color: transparent;
  color: #666;
  padding: 8px;
  font-size: 14px;
  border: 1px dashed #999;
  font-family: monospace;
  cursor: pointer;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.dropdown-content a:hover {background-color: #fcfcfc;}

.dropdown:hover .dropdown-content {display: block;}

.dropdown:hover .dropbtn {
  background-color: #f0f0f0;
  color: #333;
}
</style>
    </head>    
    <body>
        <div class="rectangle">
            <h1>"hiiiiiii!!!!" </h1>
            <div class="dropdown">
                <button class="dropbtn">You can find me in these places c: </button>
                <div class="dropdown-content">
                    <a href="https://x.com/kamilluskaw">Twitter</a>
                    <a href="https://www.twitch.tv/kamilluskaw">Twitch</a>
                    <a href="https://www.youtube.com/@kamilluskaw">Youtube</a>
                </div>
            </div>
        </div>
    </body>
</html>
